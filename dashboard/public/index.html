<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rep Activity Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="container header-inner">
      <div class="header-brand">
        <img id="companyLogo" src="" alt="" class="header-logo hidden">
        <span id="companyName" class="header-title">Rep Dashboard</span>
      </div>
      <div class="header-controls">
        <div class="date-wrap">
          <label for="datePicker" class="sr-only">Date</label>
          <input type="date" id="datePicker" class="date-input">
        </div>
        <button id="refreshBtn" class="btn btn-primary">&#8635; Refresh</button>
        <span id="lastRefresh" class="last-refresh"></span>
      </div>
    </div>
    <!-- BREADCRUMB -->
    <div class="container">
      <nav id="breadcrumb" class="breadcrumb" aria-label="Navigation"></nav>
    </div>
  </header>

  <!-- MAIN -->
  <main class="container main-content" id="app">

    <!-- View: Group List -->
    <section id="view-groups" class="view active">
      <div id="groups-grid" class="groups-grid"></div>
    </section>

    <!-- View: Group Detail -->
    <section id="view-group" class="view">
      <div id="group-summary-bar" class="summary-bar"></div>
      <div id="group-ai-summary" class="ai-summary-box hidden"></div>
      <div id="members-list" class="members-list"></div>
    </section>

    <!-- View: Member Detail -->
    <section id="view-member" class="view">
      <div id="member-header" class="member-header"></div>
      <div id="member-range-tabs" class="range-tabs"></div>
      <div id="member-content" class="member-content"></div>
    </section>

  </main>

  <!-- LOADING OVERLAY -->
  <div id="loading" class="loading-overlay hidden">
    <div class="spinner"></div>
  </div>

  <!-- TOAST -->
  <div id="toast" class="toast hidden"></div>

  <script src="app.js"></script>
</body>
</html>
